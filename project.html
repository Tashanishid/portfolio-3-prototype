<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - Project Title.doc</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            /* Notebook grid background */
            background-color: #fdfbf7;
            background-image: 
                linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 28px 28px;
            
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: 'Inter', sans-serif;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Document Window Container */
        .window {
            width: 560px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.04);
            border: 1px solid #cbd5e1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Bar */
        .window-topbar {
            height: 36px;
            background-color: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: relative;
            flex-shrink: 0;
            border-radius: 10px 10px 0 0;
        }

        .window-controls {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 16px;
        }

        .control-circle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .circle-red { background-color: #ff5f56; }
        .circle-yellow { background-color: #ffbd2e; }
        .circle-green { background-color: #27c93f; }

        .window-title {
            width: 100%;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
        }

        /* Toolbar Row */
        .window-toolbar {
            height: 32px;
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .back-link {
            font-size: 13px;
            color: #2563eb;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        /* Window Body */
        .window-body {
            padding: 24px 24px 32px 24px;
            display: flex;
            flex-direction: column;
        }

        /* 1. Large Text */
        .project-title {
            font-size: 26px;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 12px 0;
        }

        /* 2. Top Badges */
        .badge-row {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .badge {
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
            background-color: #f1f5f9;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        /* 3. Image Placeholder */
        .image-placeholder {
            width: 100%;
            height: 160px;
            background-color: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
        }

        /* 4. Text Lines */
        .qna-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .qna-row {
            display: flex;
            align-items: center;
        }

        .qna-label {
            width: 110px;
            font-weight: 500;
            color: #475569;
            flex-shrink: 0;
        }

        .qna-blank {
            flex-grow: 1;
            border-bottom: 2px solid #cbd5e1; /* blank solid line */
            height: 18px; /* give it some bottom room to look like a line to write on */
        }

        /* 5. Bottom Tool Badges */
        .tool-badges {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .tool-badge {
            font-size: 13px;
            font-weight: 500;
            color: #0f172a;
            background-color: #ffffff;
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid #94a3b8;
        }

        /* 6. Outlined Buttons */
        .button-group {
            display: flex;
            gap: 16px;
        }

        .outline-button {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            background-color: transparent;
            border: 2px solid #94a3b8;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            min-width: 100px;
            transition: all 0.2s;
            position: relative;
        }

        .outline-button:hover {
            background-color: #f1f5f9;
        }

        /* Annotations (Handwritten style) */
        .annotation {
            position: absolute;
            font-family: 'Caveat', cursive;
            color: #dc2626; /* red pen */
            font-size: 19px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
        }

        /* Position annotations */
        #anno-close {
            top: -24px;
            left: -80px;
            transform: rotate(-3deg);
        }

        #anno-back {
            top: 40px;
            left: -120px;
            transform: rotate(2deg);
        }

        #anno-github {
            bottom: -30px;
            left: 100px;
            transform: rotate(-2deg);
        }

        #anno-live {
            bottom: 60px;
            left: 310px;
            transform: rotate(1deg);
        }

    </style>
</head>
<body>

    <div class="window">

        <!-- Annotations -->
        <div class="annotation" id="anno-close">✕ → Desktop</div>
        <div class="annotation" id="anno-back">← → Projects Folder</div>
        <div class="annotation" id="anno-github">↓ → External: GitHub</div>
        <div class="annotation" id="anno-live">→ External: Live Site</div>

        <!-- Top Bar Chrome -->
        <div class="window-topbar">
            <div class="window-controls">
                <div class="control-circle circle-red" onclick="window.location.href='index.html'" style="cursor: pointer;"></div>
                <div class="control-circle circle-yellow"></div>
                <div class="control-circle circle-green"></div>
            </div>
            <div class="window-title">Project Title.doc</div>
        </div>

        <!-- Toolbar -->
        <div class="window-toolbar">
            <div class="back-link" onclick="window.location.href='projects.html'">← Back to Projects Folder</div>
        </div>

        <!-- Window Body -->
        <div class="window-body">
            
            <h1 class="project-title">PROJECT TITLE</h1>
            
            <div class="badge-row">
                <div class="badge">[tag]</div>
                <div class="badge">[tag]</div>
                <div class="badge">[2024]</div>
            </div>

            <div class="image-placeholder">
                [ SCREENSHOT / IMAGE PLACEHOLDER ]
            </div>

            <div class="qna-list">
                <div class="qna-row">
                    <div class="qna-label">What I built:</div>
                    <div class="qna-blank"></div>
                </div>
                <div class="qna-row">
                    <div class="qna-label">How I built it:</div>
                    <div class="qna-blank"></div>
                </div>
                <div class="qna-row">
                    <div class="qna-label">What I learned:</div>
                    <div class="qna-blank"></div>
                </div>
            </div>

            <div class="tool-badges">
                <div class="tool-badge">[Python]</div>
                <div class="tool-badge">[SQL]</div>
                <div class="tool-badge">[Tableau]</div>
            </div>

            <div class="button-group">
                <button class="outline-button" id="btn-github">[ GitHub ]</button>
                <button class="outline-button" id="btn-live">[ Live Site ]</button>
            </div>

        </div>

    </div>

    <!-- Adjust annotation points specifically for the buttons using JS just to be extremely exact 
         Or just relying on absolute coordinates below for a static wireframe feel -->

</body>
</html>
