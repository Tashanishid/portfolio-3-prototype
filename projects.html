<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - Projects Folder</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@400;400i;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            /* Notebook grid background */
            background-color: #fdfbf7;
            background-image: 
                linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 28px 28px;
            
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: 'Inter', sans-serif;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Finder Window */
        .window {
            width: 560px;
            height: 380px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.04);
            border: 1px solid #cbd5e1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Window Top Bar (Chrome) */
        .window-topbar {
            height: 36px;
            background-color: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: relative;
            flex-shrink: 0;
            border-radius: 10px 10px 0 0;
        }

        .window-controls {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 16px;
        }

        .control-circle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .circle-red { background-color: #ff5f56; }
        .circle-yellow { background-color: #ffbd2e; }
        .circle-green { background-color: #27c93f; }

        .window-title {
            width: 100%;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
        }

        /* Toolbar Row */
        .window-toolbar {
            height: 32px;
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            flex-shrink: 0;
        }

        .btn-back {
            background: none;
            border: 1px solid #cbd5e1;
            background-color: #ffffff;
            border-radius: 4px;
            cursor: pointer;
            padding: 2px 8px;
            font-size: 14px;
            color: #475569;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .breadcrumb {
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
        }

        /* Window Body (File Grid) */
        .window-body {
            flex-grow: 1;
            padding: 24px 32px 12px 32px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .file-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px 40px;
            flex-grow: 1;
        }

        .file-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .file-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1e293b;
        }

        .file-box {
            width: 100px;
            height: 80px;
            background-color: #f8fafc;
            border: 2px solid #94a3b8;
            border-radius: 6px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .file-item:hover .file-box {
            background-color: #ffffff;
            border-color: #64748b;
            box-shadow: 2px 2px 0px #cbd5e1;
            transform: translateY(-2px);
        }

        .file-desc {
            font-size: 13px;
            color: #64748b;
            line-height: 1.3;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            font-style: italic;
            color: #94a3b8;
            margin-top: auto;
            padding-top: 12px;
        }

        /* Annotations (Handwritten style) */
        .annotation {
            position: absolute;
            font-family: 'Caveat', cursive;
            color: #dc2626; /* red pen color */
            font-size: 19px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
        }

        /* Position the annotations floating outside or overlapping */

        #anno-close {
            top: -22px;
            left: -80px;
            transform: rotate(-3deg);
        }

        #anno-back {
            top: 36px; /* align with toolbar */
            left: -110px;
            transform: rotate(2deg);
        }

        #anno-double-click {
            /* point to the top-right box (Project Two) for example */
            top: 130px;
            right: -130px;
            transform: rotate(-1deg);
        }

    </style>
</head>
<body>

    <!-- Finder Window -->
    <div class="window">
        
        <!-- Annotations -->
        <div class="annotation" id="anno-close">✕ → Desktop</div>
        <div class="annotation" id="anno-back">← → Desktop</div>
        <div class="annotation" id="anno-double-click">← double-click → Project File</div>

        <div class="window-topbar">
            <div class="window-controls">
                <div class="control-circle circle-red" onclick="window.location.href='index.html'" style="cursor: pointer;"></div>
                <div class="control-circle circle-yellow"></div>
                <div class="control-circle circle-green"></div>
            </div>
            <div class="window-title">Projects</div>
        </div>

        <div class="window-toolbar">
            <button class="btn-back" onclick="window.location.href='index.html'">←</button>
            <div class="breadcrumb">Desktop &nbsp;/&nbsp; Projects</div>
        </div>

        <div class="window-body">
            <div class="file-grid">
                
                <!-- Project 1 -->
                <div class="file-item" ondblclick="window.location.href='project.html'">
                    <div class="file-title">📄 Project One</div>
                    <div class="file-box"></div>
                    <div class="file-desc">One-liner description here.</div>
                </div>

                <!-- Project 2 -->
                <div class="file-item" ondblclick="window.location.href='project.html'">
                    <div class="file-title">📄 Project Two</div>
                    <div class="file-box"></div>
                    <div class="file-desc">One-liner description here.</div>
                </div>

                <!-- Project 3 -->
                <div class="file-item" ondblclick="window.location.href='project.html'">
                    <div class="file-title">📄 Project Three</div>
                    <div class="file-box"></div>
                    <div class="file-desc">One-liner description here.</div>
                </div>

                <!-- Project 4 -->
                <div class="file-item" ondblclick="window.location.href='project.html'">
                    <div class="file-title">📄 Project Four</div>
                    <div class="file-box"></div>
                    <div class="file-desc">One-liner description here.</div>
                </div>
            </div>

            <div class="footer-text">Double-click a file to open it.</div>
        </div>
    </div>

</body>
</html>
